name: OrangeHRM Playwright Tests & Allure Report

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Playwright Tests (Shard ${{ matrix.shard_index }}/3)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]
    env:
      CI: true
      BASE_URL: https://opensource-demo.orangehrmlive.com
      ADMIN_USERNAME: Admin
      ADMIN_PASSWORD: admin123

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests (Shard ${{ matrix.shard_index }}/3)
        run: npm run test:ci -- --shard=${{ matrix.shard_index }}/3
        continue-on-error: true

      - name: Upload Allure Results (Shard ${{ matrix.shard_index }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard_index }}
          path: allure-results
          if-no-files-found: warn
          retention-days: 14

  report:
    name: Generate & Deploy Allure Report
    if: always()
    needs: [test]
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Download All Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          merge-multiple: true
          path: allure-results

      - name: Ensure Allure Results Directory
        run: mkdir -p allure-results

      - name: Generate Allure Report
        run: npm run allure:generate
        continue-on-error: true

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: >
          always() &&
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'master')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
        continue-on-error: true